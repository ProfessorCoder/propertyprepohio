<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Property Prep Ohio | Property Repairs, Cleanouts & Turnovers</title>

<meta name="description" content="Property Prep Ohio helps home sellers, buyers, agents, and landlords get properties ready with repairs, cleanouts, and rental turnovers across Ohio.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://propertyprepohio.com/">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3YREESE77M"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-3YREESE77M');
</script>

<!-- Local Business SEO -->
<script type="application/ld+json">
{
 "@context": "https://schema.org",
 "@type": "HomeAndConstructionBusiness",
 "name": "Property Prep Ohio",
 "areaServed": "Ohio",
 "url": "https://propertyprepohio.com/"
}
</script>

<style>
body {font-family: Arial; margin:0;}
.hero {background:#111; color:white; padding:60px; text-align:center;}
.section {padding:40px;}
.btn {background:#22c55e; color:white; padding:12px 20px; text-decoration:none; display:inline-block;}
input, textarea, select {width:100%; padding:12px; margin:8px 0;}
</style>
</head>

<body>

<div class="hero">
<h1>Property Prep Ohio</h1>
<p>Repairs, Cleanouts & Turnover Services</p>
<a href="#form" class="btn">Request Quote</a>
</div>

<div class="section">
<h2>Services</h2>
<ul>
<li>Cleanouts</li>
<li>Repairs</li>
<li>Rental Turnovers</li>
<li>Move-in Prep</li>
</ul>
</div>

<div class="section" id="form">
<h2>Request a Free Estimate</h2>

<form action="https://formspree.io/f/xpwllvbq" method="POST" enctype="multipart/form-data">

<input type="text" name="name" placeholder="Name" required>
<input type="tel" name="phone" placeholder="Phone" required>
<input type="email" name="email" placeholder="Email">

<input type="text" id="property-address" name="address" placeholder="Property Address" required>

<select name="service">
<option value="">Service Needed</option>
<option>Cleanout</option>
<option>Repairs</option>
<option>Turnover</option>
</select>

<textarea name="message" placeholder="Describe the job"></textarea>

<input type="file" name="photos" multiple>

<!-- Hidden tracking -->
<input type="hidden" name="_next" value="https://propertyprepohio.com/thank-you.html">
<input type="hidden" name="utm_source" id="utm_source">
<input type="hidden" name="utm_medium" id="utm_medium">
<input type="hidden" name="utm_campaign" id="utm_campaign">
<input type="hidden" name="landing_page" id="landing_page">
<input type="hidden" name="referrer" id="referrer">

<p style="font-size:13px;">We will review your request and call you back.</p>

<button class="btn">Submit</button>
</form>
</div>

<!-- Lead Tracking -->
<script>
(function(){
const params = new URLSearchParams(window.location.search);
document.getElementById('utm_source').value = params.get('utm_source') || '';
document.getElementById('utm_medium').value = params.get('utm_medium') || '';
document.getElementById('utm_campaign').value = params.get('utm_campaign') || '';
document.getElementById('landing_page').value = window.location.href;
document.getElementById('referrer').value = document.referrer;

document.querySelector("form").addEventListener("submit", function(){
gtag('event','generate_lead');
});
})();
</script>

<!-- Google Address Autocomplete -->
<script>
function initAutocomplete() {
const input = document.getElementById("property-address");

const autocomplete = new google.maps.places.Autocomplete(input, {
types: ["address"],
componentRestrictions: {country: "us"}
});

autocomplete.addListener("place_changed", () => {
const place = autocomplete.getPlace();
if(place.formatted_address){
input.value = place.formatted_address;
}
});
}
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB5Zc4HPDlIU5kqCJb0Yt3uIcYqVnWICIs&libraries=places&callback=initAutocomplete" async defer></script>

</body>
</html>
